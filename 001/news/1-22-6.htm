<P><BR>유승준이 국내 가요계에 데뷔하기 이전 미국에서 녹음했던 노래를 담은 앨범이 [유승준 히든 스토리]란 이름으로

유승준은 의외의 장기도 선보인다.<BR><BR>유승준의 '숨겨진 이야기'가 궁금하다면 [히든 스토리]를 선택하는 것에 주저하지
