&nbsp;마하골에서 불교의 영향력은 매우 크다.<br>
&nbsp;금련산 중턱의 마하사는 이 지역을 대표하는 절로 유명하고 마하골에 끼치는 영향은 절대적이다.<br>
&nbsp;마하사 말고도 우암사, 용문사, 천호사 등 잘 알려지지 않은 여러 개의 절도 이 지역에 상당수 있다.<br>
&nbsp;이미 이 마하골지역은 기독교의 진리보다 불교에서 말하는 교법이 더욱 확고하게 자리잡혀 있다.<br>
&nbsp;아마 그 이유는 마하골은 금련산 밑에 있는 지역이기 때문에 다른 지역보다 절들이 많기 때문인 것 같다.<br>
