&nbsp;이 지역에는 불교외에도 천주교와 천도교가 어느 한 구석에 자리잡고 있었다.<br>
&nbsp;천주교는 비록 연산3동은 아니지만 망미1동과 연산3동의 행정경계근처인 부산여상근처에 "망미성당"이라는 이름으로 자리잡고 있었다.<br>
&nbsp;성당의 건물크기나 거기에 다니는 성도들의 수를 봤을때 이 지역에 상당히 큰 영향을 미치고 있었다.<br>
&nbsp;그리고 천도교도 연산3동은 아니지만 근처의 연산6동에 "천도교동부산교구"라는 이름으로 있었다.<br>
&nbsp;동부산 전체의 천도교기관이지만 크게 일반화되지 않은 종교라서 그리 큰 영향을 미치리라 보지는 않는다.
