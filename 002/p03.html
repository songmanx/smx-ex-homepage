<br>
<b>소강(遡江)</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;홍순현<br>
<br>
좁은 정육면체, 틈 사이로 스며드는 아침햇살이란<br>
나에게 있어서는 나약한 존재가 아닐 수 없다<br>
<br>
그 속에서의 웅크림과 울먹임은<br>
나에게 있어서는 야속한 고독이 아닐수 없다<br>
<br>
훗...허나...<br>
내 자그마한 두 손아귀에 주어져 있는<br>
시가 적힌 낡은 종이 조각을 놓지는 않았다<br>
<br>
언젠가 그 시를 속삭이며<br>
강을 거슬러 가는 뱃사공이 되리라고...<br>
<br>
무(無)라는 것은 한낮 노의 희생물일 뿐이다.<br>
<br>
강... 강을 거스른다는건 시를 끄적이는 것이다.<br>
