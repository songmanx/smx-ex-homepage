<br><b>낙엽이여</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;송정현<br>
<br>
기억하는가<br>
북풍에도<br>
가을조차 그리워 않던<br>
앙상한 나뭇가지를<br>
<br>
따스한 바람에 고개내민<br> 
여린 순을<br>
<br>
하늘을 뒤흔들던 폭풍우에도<br>
거침없이 당당하던<br>
푸른 잎새를<br>
<br>
낙엽이여<br>
오오 낙엽이여<br>
흐린 하늘아래 목을 매단<br>
오오 나의 슬픈 낙엽이여<br>
    </td>
   </tr>
