  <script>

    function imgOn(imgName) {
      if (document.images) {
        document[imgName].src = window[`${imgName}on`].src;
      }
    }

    function imgOff(imgName) {
      if (document.images) {
        document[imgName].src = window[`${imgName}off`].src;
      }
    }
