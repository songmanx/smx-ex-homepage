    <td align=center><font size=2>
<br>
<b>별</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;허재민<br>
<br>
내 맘속 깊은 곳에는<br>
항상 나를 지켜주는<br>
내 별이 있습니다<br>
<br>
내가 갈 곳이 어디인지<br>
내가 있어야 할 곳이 어디인지<br>
항상 불을 밝히고<br>
나를 인도해 주는 별이 있습니다<br>
<br>
그 별빛이 나를 항상<br>
일으켜주고<br>
나를 인도해주며<br>
나를 세상에 발을 딛게<br>
해 주었습니다<br>
<br>
내 마음속 별은<br>
선합니다<br>
내 마음속에서<br>
나를 항상 꾸짖고<br>
항상 나는 변하게 합니다<br>
<br>
나는 이 고마운 별이<br>
있기에<br>
언제나 나다운 모습으로<br>
살아갈 수 있습니다.<br>
    </td>
   </tr>
