<br>
<b>행복</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;허태환<br>
<br>
온통 회색먼지 가득찬<br>
사방이 막힌 하늘로만 뚫린 공간<br>
<br>
녹슨 철통 가득찬 붉은 숯은<br>
숨이 턱턱 막히는 열기와 먼지를<br>
좁은 공간에 내뿜는다.<br>
<br>
나는 그곳에 있다.<br>
온통 회색먼지로 뒤덮히고<br>
땀에 푹 젖은 채<br>
<br>
하지만 쏴하고 쏟아지는<br>
소나기 같은 바람이<br>
내몸의 회색빛을 씻어준다.<br>
<br>
고개를 들어보면<br>
뿌연 먼지 사이로<br>
작지만 푸른하늘이 보인다.<br>
나는 행복하다.<br>
    </td>
