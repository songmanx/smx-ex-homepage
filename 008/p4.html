<br><b>무 제</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;박재삼
<br><br>




     

이파리들이 시방<br>
햇빛 속에서 신나게 휴욕(休浴)하고 있고<br>
그 동안 사랑하는 사람을 홀로 안으로<br>
답답하게 부르고만 있던 <br>
그 긴 짝사랑에서 벗어나<br>
이제는 나도 숨이 막히는<br>
푸른 녹음 속으로<br>
이 부끄러운 가슴을 열어<br>
서서히 들이 밀거나<br>
진실로 죽을 만치 사랑 한다고<br>
고백하고 말리라.<br><br>

정수리에 내리붓는<br>
뜨거운 햇빛과<br>
푸른 이파리<br>
이것의 상관관계를 보기는 본다마는<br>
그러나 늘 가물가물한 가운데<br>
아득하기만 하고나,<br>
이 미해결 때문에<br>
나는 아직도 시를 못 버리는 구나.
