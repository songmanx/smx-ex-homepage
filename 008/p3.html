<br><b>갈매기</b><br>
<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;천상병
<br><br>


  
            

그대로의 그리움이<br>
갈매기로 하여금<br>
구름이 되게 하였다.<br><br>
 
기꺼운 듯<br>
푸른 바다의 이름으로<br>
흰 날개를 하늘에 묻어 보내어<br><br>
 
이제 파도도<br>
빛나는 가슴도<br>
구름을 따라 먼 나라로 흘렀다.<br><br>
 
그리하여 몇 번이고<br>
몇 번이고 <br>
날아 오르는 자랑이었다.<br><br>
 
아름다운 마음이었다.
