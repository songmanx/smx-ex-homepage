기억해 주어요<br>
부디 날 기억해 주오<br><br>

나아 이대로 <br>
못잊는 연보라의 물망초 이지만<br>
혹시는 잊으려 원하시면은<br>
유순히 편안스레 잊으라도 주어요<br><br>

나아 언제나 못잊는 <br>
꽃아름의 물망초 이지만<br><br>

깜깜한밤에 <br>
속이 파리 피어나는 나무들의 기쁨<br>
당신 그늘에 등불없이 서 있어도<br>
달밤 같은 위로<br><br>

사람과 꽃이<br>
영혼의 길을 트고 살았을때<br>
미소와 도취만이 큰 배같던길<br><br>

당신이 간후 바람곁에 내버린<br>
꽃길 연보라는 못잊는 물망초 이지만<br><br>

기억해 주어요<br>
지금은 눈도 먼<br>
물망초 이지만........
